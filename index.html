<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a3c33" />

    <title>COCO36 — From crop to craft. Origin ingredients for makers.</title>
    <meta name="description" content="Cocoa, flours, vanilla, and rare botanicals — sourced direct from heritage farms across 12 countries. 36-step traceability, fair trade, free shipping across India." />

    <!-- Open Graph / social -->
    <meta property="og:site_name" content="COCO36" />
    <meta property="og:title" content="COCO36 — Crop-to-craft marketplace" />
    <meta property="og:description" content="Sustainable origin ingredients for craft kitchens of tomorrow — cocoa, flours, vanilla, spices, sourced direct from origin." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:url" content="https://coco36.com/" />
    <meta property="og:image" content="https://coco36.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="COCO36 — from crop to craft" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="COCO36 — Crop-to-craft marketplace" />
    <meta name="twitter:description" content="Origin ingredients for makers — cocoa, flours, vanilla, spices, sourced direct from origin." />
    <meta name="twitter:image" content="https://coco36.com/og.png" />

    <!-- Preconnect to perf-critical origins -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!-- Fonts are self-hosted (public/fonts, @font-face rules in the CSS
         bundle). Preload the two files virtually every page paints with. -->
    <link rel="preload" href="/fonts/archivo-normal-400-900-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/dm-sans-normal-300-700-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Favicon + iOS touch icon -->
    <link rel="icon" type="image/png" href="/coco36-floral.png" />
    <link rel="apple-touch-icon" href="/coco36-floral.png" />

    <!-- Site-wide structured data (static: readable without JS rendering).
         Per-product JSON-LD is injected client-side on PDPs (src/lib/seo.ts). -->
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","@id":"https://coco36.com/#org","name":"COCO36","legalName":"COCO36 Foods Pvt Ltd","url":"https://coco36.com/","logo":"https://coco36.com/coco36-floral.png","description":"Crop-to-craft marketplace — origin ingredients for makers: cocoa, flours, vanilla, and rare botanicals sourced direct from heritage farms."}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","@id":"https://coco36.com/#website","name":"COCO36","url":"https://coco36.com/","publisher":{"@id":"https://coco36.com/#org"},"potentialAction":{"@type":"SearchAction","target":{"@type":"EntryPoint","urlTemplate":"https://coco36.com/shop?q={search_term_string}"},"query-input":"required name=search_term_string"}}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
